services:
  router:
    build: .
    env_file: .env
    environment:
      METRICS_DB: /data/router.db
    ports:
      - "8080:8080"
    volumes:
      - router-data:/data
  ollama:
    image: ollama/ollama:latest
    profiles: ["local"]
    volumes:
      - ollama:/root/.ollama

volumes:
  ollama:
  router-data:
